<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultation Services — Online Hospital</title>
    <meta name="description" content="Configure and manage your consultation services. Set pricing, availability, and service descriptions.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚕</text></svg>">

    <style>
        /* ═══════════════════════════════════════════════════════
           SERVICES — Luxury Concierge Aesthetic
           ═══════════════════════════════════════════════════════ */

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection { background: #B8956A; color: #FFFFFF; }

        :root {
            --color-bg:             #FAFAFA;
            --color-bg-pure:        #FFFFFF;
            --color-bg-sidebar:     #111111;
            --color-text:           #111111;
            --color-text-muted:     #6B6B6B;
            --color-text-light:     #999999;
            --color-text-sidebar:   rgba(255, 255, 255, 0.55);
            --color-accent:         #1A1A2E;
            --color-accent-warm:    #B8956A;
            --color-accent-gold:    #C9A96E;
            --color-accent-taupe:   #C4B5A0;
            --color-border:         #E8E4DF;
            --color-border-light:   #F0ECE8;
            --color-success:        #3D8B5F;
            --color-success-bg:     #F0F9F4;
            --color-pending:        #9A8355;
            --color-pending-bg:     #FBF8F1;
            --color-pending-border: #E8DFC8;
            --color-error:          #C43E3E;
            --color-error-bg:       #FEF2F2;

            --font-serif: 'Playfair Display', 'Georgia', serif;
            --font-sans:  'Inter', 'Helvetica Neue', Arial, sans-serif;

            --space-xs: 0.5rem; --space-sm: 1rem; --space-md: 1.5rem;
            --space-lg: 2.5rem; --space-xl: 4rem;
            --sidebar-width: 260px;
            --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ease-out:    cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body {
            font-family: var(--font-sans); color: var(--color-text);
            background-color: var(--color-bg); line-height: 1.7; overflow-x: hidden;
        }

        .dashboard { display: flex; min-height: 100vh; }


        /* ── Sidebar (identical) ─────────────────────────── */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: var(--sidebar-width);
            background-color: var(--color-bg-sidebar);
            display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.4s var(--ease-smooth);
        }

        .sidebar__brand {
            padding: 2.25rem 2rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar__brand a {
            font-family: var(--font-serif); font-weight: 700;
            font-size: 1.05rem; letter-spacing: 0.04em;
            color: var(--color-bg-pure); text-decoration: none;
        }

        .sidebar__nav { flex: 1; padding: 2rem 0; overflow-y: auto; }

        .sidebar__label {
            font-family: var(--font-sans); font-weight: 500;
            font-size: 0.58rem; letter-spacing: 0.25em;
            text-transform: uppercase; color: rgba(255, 255, 255, 0.2);
            padding: 0 2rem; margin-bottom: 1rem;
        }

        .sidebar__menu {
            list-style: none; display: flex; flex-direction: column; gap: 0.15rem;
        }

        .sidebar__link {
            display: flex; align-items: center; gap: 0.85rem;
            padding: 0.7rem 2rem;
            font-family: var(--font-sans); font-weight: 400; font-size: 0.8rem;
            color: var(--color-text-sidebar); text-decoration: none;
            transition: all 0.25s var(--ease-smooth);
            position: relative; letter-spacing: 0.01em;
        }

        .sidebar__link::before {
            content: '';
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 0; background: var(--color-accent-warm);
            border-radius: 0 2px 2px 0;
            transition: height 0.25s var(--ease-smooth);
        }

        .sidebar__link:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.04);
        }

        .sidebar__link--active {
            color: var(--color-bg-pure); font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
        }

        .sidebar__link--active::before { height: 22px; }

        .sidebar__icon { width: 17px; height: 17px; opacity: 0.55; flex-shrink: 0; }
        .sidebar__link--active .sidebar__icon { opacity: 1; }

        .sidebar__footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar__logout {
            display: flex; align-items: center; gap: 0.7rem;
            font-family: var(--font-sans); font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none; transition: color 0.3s var(--ease-smooth);
            background: none; border: none; cursor: pointer; padding: 0;
        }

        .sidebar__logout:hover { color: rgba(255, 255, 255, 0.65); }


        /* ── Main ────────────────────────────────────────── */
        .main {
            flex: 1; margin-left: var(--sidebar-width); min-height: 100vh;
        }

        .main__inner {
            max-width: 960px; margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
        }


        /* ── Page Header ─────────────────────────────────── */
        .page-header {
            display: flex; align-items: flex-start;
            justify-content: space-between;
            margin-bottom: var(--space-lg);
            opacity: 0; transform: translateY(14px);
            animation: fadeInUp 0.65s var(--ease-smooth) 0.1s forwards;
            flex-wrap: wrap; gap: 1rem;
        }

        .page-header__text {}

        .page-header__overline {
            font-family: var(--font-sans); font-weight: 500;
            font-size: 0.62rem; letter-spacing: 0.28em;
            text-transform: uppercase; color: var(--color-accent-warm);
            margin-bottom: 0.5rem; display: block;
        }

        .page-header__title {
            font-family: var(--font-serif); font-weight: 700;
            font-size: clamp(1.5rem, 3vw, 2rem);
            line-height: 1.2; letter-spacing: -0.01em;
            color: var(--color-text); margin-bottom: 0.35rem;
        }

        .page-header__desc {
            font-family: var(--font-sans); font-size: 0.88rem;
            color: var(--color-text-muted); font-weight: 400;
        }


        /* ── Service Card ────────────────────────────────── */
        .service-card {
            background: var(--color-bg-pure);
            border: 1px solid var(--color-border-light);
            padding: 2rem;
            transition: all 0.4s var(--ease-smooth);
        }

        .service-card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }

        .service-card + .service-card { margin-top: 1.5rem; }

        .service-card__header {
            display: flex; align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1.5rem; gap: 1rem;
        }

        .service-card__icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: #F7F4F0; color: var(--color-accent-warm);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .service-card__badge {
            display: inline-block; padding: 0.2rem 0.65rem;
            font-family: var(--font-sans); font-size: 0.58rem;
            font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; border-radius: 2px;
            background: var(--color-success-bg);
            color: var(--color-success); border: 1px solid #C8E6D5;
        }

        .service-card__title {
            font-family: var(--font-serif); font-weight: 600;
            font-size: 1.15rem; color: var(--color-text);
            margin-bottom: 0.35rem;
        }

        .service-card__desc {
            font-size: 0.85rem; color: var(--color-text-muted);
            line-height: 1.6; margin-bottom: 1.5rem;
            max-width: 560px;
        }

        .service-card__meta {
            display: flex; align-items: center; gap: 2rem;
            padding: 1.25rem 0; margin-bottom: 1.5rem;
            border-top: 1px solid var(--color-border-light);
            border-bottom: 1px solid var(--color-border-light);
        }

        .service-card__meta-label {
            display: block;
            font-family: var(--font-sans); font-weight: 500;
            font-size: 0.58rem; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--color-text-light);
            margin-bottom: 0.25rem;
        }

        .service-card__meta-value {
            font-family: var(--font-serif); font-weight: 700;
            font-size: 1.15rem; color: var(--color-text);
        }

        .service-card__meta-value span {
            font-family: var(--font-sans); font-weight: 400;
            font-size: 0.78rem; color: var(--color-text-light);
        }

        .service-card__actions { display: flex; gap: 0.85rem; }

        .service-card__date {
            font-size: 0.72rem; color: var(--color-text-light);
            margin-top: 1rem;
        }


        /* ── Buttons ─────────────────────────────────────── */
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.8rem;
            font-family: var(--font-sans); font-weight: 600;
            font-size: 0.62rem; letter-spacing: 0.18em;
            text-transform: uppercase; cursor: pointer;
            transition: all 0.35s var(--ease-smooth); border: none;
        }

        .btn--primary {
            background: var(--color-text); color: var(--color-bg-pure);
        }

        .btn--primary:hover { background: var(--color-accent); }

        .btn--gold {
            background: var(--color-accent-warm); color: var(--color-bg-pure);
        }

        .btn--gold:hover { background: #A07B52; }

        .btn--outline {
            background: transparent; color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn--outline:hover {
            border-color: var(--color-text); background: #FDFCFB;
        }

        .btn--danger-outline {
            background: transparent; color: var(--color-error);
            border: 1px solid #F0D0D0;
        }

        .btn--danger-outline:hover {
            background: var(--color-error-bg);
            border-color: var(--color-error);
        }

        .btn:disabled {
            opacity: 0.5; cursor: not-allowed;
        }


        /* ── Create Service Form (Modal-Drawer) ──────────── */
        .form-drawer {
            display: none;
            background: var(--color-bg-pure);
            border: 1px solid var(--color-border-light);
            padding: 2rem;
            margin-bottom: 1.5rem;
            opacity: 0; transform: translateY(14px);
        }

        .form-drawer--open {
            display: block;
            animation: fadeInUp 0.45s var(--ease-smooth) forwards;
        }

        .form-drawer__header {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 1.75rem; gap: 1rem;
        }

        .form-drawer__title {
            font-family: var(--font-serif); font-weight: 700;
            font-size: 1.15rem; color: var(--color-text);
        }

        .form-drawer__close {
            background: none; border: none; cursor: pointer;
            font-size: 1.3rem; color: var(--color-text-light);
            transition: color 0.3s var(--ease-smooth);
            padding: 0; line-height: 1;
        }

        .form-drawer__close:hover { color: var(--color-text); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-row .form-group { margin-bottom: 0; }

        .form-label {
            display: block;
            font-family: var(--font-sans); font-weight: 500;
            font-size: 0.62rem; letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--color-text-muted);
            margin-bottom: 0.5rem;
        }

        .form-input, .form-textarea {
            width: 100%; padding: 0.875rem 0;
            border: none;
            border-bottom: 1px solid var(--color-border);
            background: transparent;
            font-family: var(--font-sans);
            font-size: 0.92rem; font-weight: 400;
            color: var(--color-text); outline: none;
            transition: border-color 0.3s var(--ease-smooth);
        }

        .form-input::placeholder, .form-textarea::placeholder {
            color: var(--color-text-light); font-weight: 300;
        }

        .form-input:focus, .form-textarea:focus {
            border-bottom-color: var(--color-text);
        }

        .form-textarea {
            resize: vertical; min-height: 80px;
            line-height: 1.6;
        }

        .form-error {
            margin-top: 0.75rem; padding: 0.75rem 1rem;
            background: var(--color-error-bg);
            border-left: 3px solid var(--color-error);
            font-size: 0.82rem; color: var(--color-error);
            line-height: 1.5; display: none;
        }

        .form-error--visible { display: block; }

        .form-actions {
            display: flex; gap: 0.85rem; margin-top: 0.5rem;
        }


        /* ── Services List Container ─────────────────────── */
        #services-list {
            display: flex; flex-direction: column; gap: 1.5rem;
        }


        /* ── Add Service Card (used as trigger) ──────────── */
        .add-card {
            background: var(--color-bg-pure);
            border: 1.5px dashed var(--color-border);
            padding: 3rem 2rem; text-align: center;
            cursor: pointer; transition: all 0.4s var(--ease-smooth);
        }

        .add-card:hover {
            border-color: var(--color-accent-warm);
            border-style: solid; background: #FDFCFB;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(184, 149, 106, 0.08);
        }

        .add-card__icon {
            width: 48px; height: 48px; margin: 0 auto 1rem;
            border-radius: 50%; background: var(--color-bg);
            display: flex; align-items: center; justify-content: center;
            color: var(--color-accent-warm); font-size: 1.2rem;
            transition: all 0.3s var(--ease-smooth);
        }

        .add-card:hover .add-card__icon {
            background: rgba(184, 149, 106, 0.12); transform: scale(1.05);
        }

        .add-card__title {
            font-family: var(--font-serif); font-weight: 600;
            font-size: 1rem; color: var(--color-text); margin-bottom: 0.35rem;
        }

        .add-card__text {
            font-size: 0.8rem; color: var(--color-text-light); line-height: 1.55;
        }


        /* ── Empty State ─────────────────────────────────── */
        .empty-state {
            text-align: center; padding: 4rem 2rem;
            background: var(--color-bg-pure);
            border: 1px solid var(--color-border-light);
        }

        .empty-state__icon {
            width: 56px; height: 56px; margin: 0 auto 1.25rem;
            border-radius: 50%; background: var(--color-bg);
            display: flex; align-items: center; justify-content: center;
            color: var(--color-accent-taupe);
        }

        .empty-state__title {
            font-family: var(--font-serif); font-weight: 600;
            font-size: 1.1rem; color: var(--color-text);
            margin-bottom: 0.4rem;
        }

        .empty-state__text {
            font-size: 0.85rem; color: var(--color-text-light);
            max-width: 360px; margin: 0 auto; line-height: 1.6;
        }


        /* ── Loading ─────────────────────────────────────── */
        .loading-inline {
            display: flex; align-items: center; justify-content: center;
            padding: 3rem; gap: 0.75rem;
        }

        .loading-inline__spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--color-border);
            border-top-color: var(--color-accent-warm);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        .loading-inline__text {
            font-size: 0.72rem; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--color-text-light);
        }


        /* ── Toast ───────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--color-text); color: var(--color-bg-pure);
            padding: 0.85rem 1.5rem;
            font-family: var(--font-sans); font-size: 0.82rem;
            font-weight: 500; z-index: 1000;
            opacity: 0; transform: translateY(12px);
            transition: all 0.4s var(--ease-smooth);
            pointer-events: none;
        }

        .toast--visible {
            opacity: 1; transform: translateY(0);
        }

        .toast--success { background: var(--color-success); }
        .toast--error   { background: var(--color-error); }


        /* ── Mobile ──────────────────────────────────────── */
        .mobile-toggle {
            display: none; position: fixed; top: 1.25rem; left: 1.25rem;
            z-index: 200; width: 40px; height: 40px;
            background: var(--color-bg-pure); border: 1px solid var(--color-border);
            align-items: center; justify-content: center;
            cursor: pointer; flex-direction: column; gap: 4px; padding: 0;
        }

        .mobile-toggle span {
            display: block; width: 16px; height: 1.5px;
            background: var(--color-text); transition: all 0.3s var(--ease-smooth);
        }

        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4); z-index: 90;
            opacity: 0; transition: opacity 0.3s var(--ease-smooth);
        }

        .sidebar-overlay--visible { opacity: 1; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) { :root { --sidebar-width: 220px; } }

        @media (max-width: 768px) {
            .mobile-toggle { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar--open { transform: translateX(0); }
            .main { margin-left: 0; }
            .main__inner { padding: 5rem 1.25rem 2.5rem; }
            .sidebar-overlay--visible { display: block; }
            .service-card__meta { flex-direction: column; gap: 1rem; }
            .form-row { grid-template-columns: 1fr; }
            .page-header { flex-direction: column; }
        }

        @media (max-width: 480px) {
            .main__inner { padding: 4.5rem 1rem 2rem; }
            .service-card__actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>

<body>
    <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
    </button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="dashboard">

        <!-- ═══ SIDEBAR ═══ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__brand">
                <a href="index.html">ONLINE HOSPITAL</a>
            </div>
            <nav class="sidebar__nav">
                <p class="sidebar__label">Navigation</p>
                <ul class="sidebar__menu">
                    <li>
                        <a href="doctor-dashboard.html" class="sidebar__link">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="appointments.html" class="sidebar__link">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            Appointments
                        </a>
                    </li>
                    <li>
                        <a href="services.html" class="sidebar__link sidebar__link--active">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                            Services
                        </a>
                    </li>
                    <li>
                        <a href="earnings.html" class="sidebar__link">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                            Earnings
                        </a>
                    </li>
                </ul>
                <p class="sidebar__label" style="margin-top: 2rem;">Account</p>
                <ul class="sidebar__menu">
                    <li>
                        <a href="#" class="sidebar__link">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Profile &amp; Credentials
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar__footer">
                <button class="sidebar__logout" id="btn-logout">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign Out
                </button>
            </div>
        </aside>


        <!-- ═══ MAIN CONTENT ═══ -->
        <main class="main">
            <div class="main__inner">

                <!-- Header with Create Button -->
                <header class="page-header">
                    <div class="page-header__text">
                        <span class="page-header__overline">Your Practice</span>
                        <h1 class="page-header__title">Consultation Services</h1>
                        <p class="page-header__desc">Configure your service offerings, set pricing, and manage availability.</p>
                    </div>
                    <button class="btn btn--gold" id="btn-create-service">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Create New Service
                    </button>
                </header>


                <!-- ═══ CREATE SERVICE FORM (Hidden by default) ═══ -->
                <div class="form-drawer" id="form-drawer">
                    <div class="form-drawer__header">
                        <h2 class="form-drawer__title">New Consultation Service</h2>
                        <button class="form-drawer__close" id="btn-close-form" aria-label="Close form">&times;</button>
                    </div>

                    <form id="create-service-form" novalidate>
                        <div class="form-group">
                            <label for="svc-title" class="form-label">Service Title</label>
                            <input type="text" id="svc-title" name="title" class="form-input"
                                   placeholder="e.g. Standard Video Consultation" required maxlength="255">
                        </div>

                        <div class="form-group">
                            <label for="svc-desc" class="form-label">Description</label>
                            <textarea id="svc-desc" name="description" class="form-textarea"
                                      placeholder="Describe what this consultation includes…" rows="3"></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="svc-duration" class="form-label">Duration (Minutes)</label>
                                <input type="number" id="svc-duration" name="duration" class="form-input"
                                       placeholder="30" min="5" max="480" required>
                            </div>
                            <div class="form-group">
                                <label for="svc-price" class="form-label">Price (USD)</label>
                                <input type="number" id="svc-price" name="price" class="form-input"
                                       placeholder="75.00" min="0" max="99999" step="0.01" required>
                            </div>
                        </div>

                        <div class="form-error" id="form-error" role="alert"></div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn--primary" id="btn-submit-service">
                                Publish Service
                            </button>
                            <button type="button" class="btn btn--outline" id="btn-cancel-form">Cancel</button>
                        </div>
                    </form>
                </div>


                <!-- ═══ SERVICES LIST (Dynamically rendered) ═══ -->
                <div id="services-list">
                    <div class="loading-inline" id="services-loading">
                        <div class="loading-inline__spinner"></div>
                        <span class="loading-inline__text">Loading services</span>
                    </div>
                </div>

            </div>
        </main>

    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>


    <!-- ═══ JAVASCRIPT ═══ -->
    <script>
    (function () {
        'use strict';

        // ── Config ─────────────────────────────────────────
        const API_PROFILE_URL  = 'api/doctor_profile.php';
        const API_SERVICES_URL = 'api/services.php';
        const LOGIN_REDIRECT   = 'login.html';


        // ── DOM ────────────────────────────────────────────
        const sidebar         = document.getElementById('sidebar');
        const mobileToggle    = document.getElementById('mobile-toggle');
        const sidebarOverlay  = document.getElementById('sidebar-overlay');
        const formDrawer      = document.getElementById('form-drawer');
        const serviceForm     = document.getElementById('create-service-form');
        const servicesList    = document.getElementById('services-list');
        const servicesLoading = document.getElementById('services-loading');
        const formError       = document.getElementById('form-error');
        const btnCreate       = document.getElementById('btn-create-service');
        const btnCloseForm    = document.getElementById('btn-close-form');
        const btnCancelForm   = document.getElementById('btn-cancel-form');
        const btnSubmit       = document.getElementById('btn-submit-service');
        const toastEl         = document.getElementById('toast');


        // ── 1. Auth Guard ──────────────────────────────────
        async function checkAuth() {
            try {
                const res = await fetch(API_PROFILE_URL, {
                    method: 'GET',
                    credentials: 'same-origin',
                    headers: { 'Accept': 'application/json' }
                });
                if (res.status === 401) {
                    window.location.href = LOGIN_REDIRECT;
                }
            } catch (err) {
                console.error('Auth check failed:', err);
            }
        }


        // ── 2. Fetch & Render Services ─────────────────────
        async function loadServices() {
            servicesLoading.style.display = 'flex';

            try {
                const res = await fetch(API_SERVICES_URL, {
                    method: 'GET',
                    credentials: 'same-origin',
                    headers: { 'Accept': 'application/json' }
                });

                if (res.status === 401) {
                    window.location.href = LOGIN_REDIRECT;
                    return;
                }

                if (!res.ok) throw new Error('Failed to load services.');

                const data = await res.json();
                renderServices(data.services || []);

            } catch (err) {
                console.error('Load services error:', err);
                servicesLoading.innerHTML = `
                    <p style="font-size:0.85rem; color:var(--color-text-muted);">
                        Unable to load services. <a href="#" onclick="location.reload()" style="color:var(--color-accent-warm);">Retry</a>
                    </p>`;
            }
        }

        function renderServices(services) {
            servicesList.innerHTML = '';

            if (services.length === 0) {
                servicesList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        </div>
                        <h3 class="empty-state__title">No Services Yet</h3>
                        <p class="empty-state__text">Create your first consultation service to start accepting patient bookings.</p>
                    </div>`;
                return;
            }

            services.forEach(svc => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.dataset.id = svc.id;

                const created = new Date(svc.created_at).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });

                card.innerHTML = `
                    <div class="service-card__header">
                        <div class="service-card__icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                        </div>
                        <span class="service-card__badge">Active</span>
                    </div>
                    <h2 class="service-card__title">${escHtml(svc.title)}</h2>
                    <p class="service-card__desc">${escHtml(svc.description || 'No description provided.')}</p>
                    <div class="service-card__meta">
                        <div>
                            <span class="service-card__meta-label">Session Fee</span>
                            <span class="service-card__meta-value">$${Number(svc.price).toFixed(0)} <span>/ session</span></span>
                        </div>
                        <div>
                            <span class="service-card__meta-label">Duration</span>
                            <span class="service-card__meta-value">${svc.duration} <span>min</span></span>
                        </div>
                        <div>
                            <span class="service-card__meta-label">Bookings</span>
                            <span class="service-card__meta-value">0</span>
                        </div>
                    </div>
                    <div class="service-card__actions">
                        <button class="btn btn--outline btn-delete-svc" data-id="${svc.id}">Delete</button>
                    </div>
                    <p class="service-card__date">Created ${created}</p>
                `;
                servicesList.appendChild(card);
            });

            // Add the "Add New Service" card at the bottom
            const addCard = document.createElement('div');
            addCard.className = 'add-card';
            addCard.id = 'add-card-trigger';
            addCard.innerHTML = `
                <div class="add-card__icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </div>
                <h3 class="add-card__title">Add Another Service</h3>
                <p class="add-card__text">Create an additional consultation tier — follow-up visits, specialist referrals, or extended sessions.</p>
            `;
            addCard.addEventListener('click', openForm);
            servicesList.appendChild(addCard);
        }


        // ── 3. Create Service ──────────────────────────────
        serviceForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideFormError();

            const title       = document.getElementById('svc-title').value.trim();
            const description = document.getElementById('svc-desc').value.trim();
            const duration    = parseInt(document.getElementById('svc-duration').value) || 0;
            const price       = parseFloat(document.getElementById('svc-price').value) || 0;

            // Client-side validation
            if (!title) return showFormError('Please enter a service title.');
            if (duration < 5) return showFormError('Duration must be at least 5 minutes.');
            if (price < 0) return showFormError('Price cannot be negative.');

            btnSubmit.disabled = true;
            btnSubmit.textContent = 'Publishing…';

            try {
                const res = await fetch(API_SERVICES_URL, {
                    method: 'POST',
                    credentials: 'same-origin',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ title, description, duration, price })
                });

                const data = await res.json();

                if (!res.ok) {
                    showFormError(data.message || 'Failed to create service.');
                    btnSubmit.disabled = false;
                    btnSubmit.textContent = 'Publish Service';
                    return;
                }

                // Success
                showToast('Service created successfully!', 'success');
                closeForm();
                serviceForm.reset();
                loadServices();

            } catch (err) {
                console.error('Create service error:', err);
                showFormError('Unable to connect. Please try again.');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.textContent = 'Publish Service';
            }
        });


        // ── 4. Form Toggle ─────────────────────────────────
        function openForm() {
            formDrawer.classList.add('form-drawer--open');
            hideFormError();
            document.getElementById('svc-title').focus();
        }

        function closeForm() {
            formDrawer.classList.remove('form-drawer--open');
            serviceForm.reset();
            hideFormError();
        }

        btnCreate.addEventListener('click', openForm);
        btnCloseForm.addEventListener('click', closeForm);
        btnCancelForm.addEventListener('click', closeForm);


        // ── 5. Form Error Helpers ──────────────────────────
        function showFormError(msg) {
            formError.textContent = msg;
            formError.classList.add('form-error--visible');
        }

        function hideFormError() {
            formError.classList.remove('form-error--visible');
        }


        // ── 6. Toast ───────────────────────────────────────
        function showToast(message, type) {
            toastEl.textContent = message;
            toastEl.className = 'toast toast--visible' + (type === 'success' ? ' toast--success' : ' toast--error');
            setTimeout(() => { toastEl.classList.remove('toast--visible'); }, 3500);
        }


        // ── 7. Utility ─────────────────────────────────────
        function escHtml(str) {
            const el = document.createElement('span');
            el.textContent = str;
            return el.innerHTML;
        }


        // ── 8. Mobile Sidebar ──────────────────────────────
        mobileToggle.addEventListener('click', () => {
            sidebar.classList.toggle('sidebar--open');
            sidebarOverlay.classList.toggle('sidebar-overlay--visible');
            sidebarOverlay.style.display = sidebar.classList.contains('sidebar--open') ? 'block' : 'none';
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('sidebar--open');
            sidebarOverlay.classList.remove('sidebar-overlay--visible');
            setTimeout(() => { sidebarOverlay.style.display = 'none'; }, 300);
        });

        // ── 9. Sign Out ────────────────────────────────────
        document.getElementById('btn-logout').addEventListener('click', () => {
            window.location.href = LOGIN_REDIRECT;
        });


        // ── Init ───────────────────────────────────────────
        checkAuth();
        loadServices();

    })();
    </script>

</body>
</html>
